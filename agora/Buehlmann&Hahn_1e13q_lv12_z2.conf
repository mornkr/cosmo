################################################
## AGORA IC file for the 1e13q halo ############
################################################

[setup]
boxlength               = 60
zstart                  = 100
levelmin                = 7
levelmin_TF             = 9
levelmax                = 12

padding                 = 16  # try reduce it at your own risk
overlap                 = 4
baryons                 = no  # switch on for baryon runs
use_2LPT                = no
use_LLA                 = no  # AMR codes might want to enable this

#Ellipsoidal refinement region defined on unity cube 
#(contains particles within 4rvir for halo at z=2)
region                     = ellipsoid
region_ellipsoid_matrix[0] = 703.6083340644852, 10.219952277839196, -178.41613143682474
region_ellipsoid_matrix[1] = 10.219952277839196, 816.092991828918, 186.40588223934182
region_ellipsoid_matrix[2] = -178.41613143682474, 186.40588223934182, 712.4244868755324
region_ellipsoid_center    = 0.4630630493164067, 0.5986731847127283, 0.3309845924377433


[cosmology]
Omega_m                 = 0.272
Omega_L                 = 0.728
Omega_b                 = 0.0455
H0                              = 70.2
sigma_8                 = 0.807
nspec                   = 0.961
transfer                = eisenstein

#below are MUSIC defaults to initialize gas temperature for some codes
#YHe				= 0.248     # primordial He abundance
#gamma				= 1.6667    # adiabatic exponent (=5/3)


[random]
cubesize                = 256
seed[8]                 = 95064
seed[9]                 = 31415
seed[10]                = 27183


[poisson]
fft_fine                = yes
accuracy                = 1e-4
grad_order      = 6
laplace_order   = 6


[output]
## GENERIC
#format			= generic
#filename		= debug.hdf5

## ENZO
#format			= enzo
#filename		= ic.enzo
##enzo_refine_region_fraction = 0.8

## GADGET-2
