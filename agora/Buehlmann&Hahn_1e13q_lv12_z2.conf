#filename		= ics_gadget.dat
#gadget_spreadcoarse	= yes
#gadget_write_conn	= yes
##gadget_num_files	= 8
##gadget_longids	= no
##gadget_usekpc		= no
##gadget_usemsol	= no
##gadget_coarsetype	= 5

## RAMSES
#ramses_nml		= yes
#format			= grafic2
#filename		= ics_ramses

## TIPSY
