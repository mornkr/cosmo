################################################
## AGORA IC file for the 1e11q halo
## to be used with MUSIC v1.5 or later
################################################
[setup]
boxlength			= 60
zstart				= 100
levelmin			= 7
levelmin_TF			= 9
levelmax			= 12
padding				= 16  # try reduce it at your own risk
overlap				= 4
align_top			= no
baryons				= no  # switch on for baryon runs
use_2LPT			= no
use_LLA				= no  # AMR codes might want to enable this

# below defines an ellipsoid region corresponding to a 500 kpc/h radius
# sphere around the 1e11q AGORA halo
region				= ellipsoid
region_ellipsoid_matrix[0] 	= 2710.833984, -498.042755, -260.366791
region_ellipsoid_matrix[1] 	= -498.042755, 1496.330933, 864.111267
region_ellipsoid_matrix[2] 	= -260.366791, 864.111267, 5030.364746
region_ellipsoid_center    	= 0.638273, 0.576312, 0.447929

[cosmology]
Omega_m				= 0.272
Omega_L				= 0.728
Omega_b				= 0.0455
H0				= 70.2
sigma_8				= 0.807
nspec				= 0.961
transfer			= eisenstein
#below are MUSIC defaults to initialize gas temperature for some codes
#YHe				= 0.248     # primordial He abundance
#gamma				= 1.6667    # adiabatic exponent (=5/3)

[random]
cubesize			= 256
seed[8]				= 95064
seed[9]				= 31415
seed[10]			= 27183
# do not add higher seeds!

[output]
## GENERIC
#format			= generic
#filename		= debug.hdf5

## ENZO
#format			= enzo
#filename		= ic.enzo
##enzo_refine_region_fraction = 0.8

## GADGET-2
#format			= gadget2
#filename		= ics_gadget.dat
##gadget_num_files	= 8
##gadget_spreadcoarse	= yes
##gadget_longids	= no
##gadget_usekpc		= no
##gadget_usemsol	= no
##gadget_coarsetype	= 5

## RAMSES
#ramses_nml		= yes
#format			= grafic2
#filename		= ics_ramses
##ramses_pvar_idx	= 1
##ramses_pvar_val	= 1.0

## TIPSY
#format			= tipsy
#filename		= ics_tipsy.dat
##tipsy_eps		= 0.02
##tipsy_native		= no

## ART
#format			= art
#filename		= ics_art.dat
##art_swap_endian	= yes
##astep			= ...

## CART
#format			= cart
#filename		= ics_cart.dat


[poisson]
fft_fine		= yes
accuracy		= 1e-6
grad_order      	= 6
laplace_order   	= 6

